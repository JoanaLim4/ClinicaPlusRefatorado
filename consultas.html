<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clínica Plus - Consultas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topo">
    <h1>Clínica Plus</h1>
    <nav>
      <a href="dashboard.html">Início</a>
      <a href="pacientes.html">Pacientes</a>
      <a href="medicos.html">Médicos</a>
      <a href="consultas.html">Consultas</a>
      <a href="index.html">Sair</a>
    </nav>
  </header>

  <main class="container">
    <h2>Agendamento de Consultas</h2>
    <form id="formConsulta" class="formulario">
      <label>CPF do Paciente</label>
      <input type="text" id="cpfConsulta" placeholder="CPF do paciente">

      <label>CRM do Médico</label>
      <input type="text" id="crmConsulta" placeholder="CRM do médico">

      <label>Data</label>
      <input type="date" id="dataConsulta">

      <label>Horário</label>
      <input type="time" id="horaConsulta">

      <button type="submit">Agendar Consulta</button>
      <p id="mensagemConsulta" class="mensagem"></p>
    </form>

    <h3>Consultas agendadas</h3>
    <table>
      <thead><tr><th>Paciente</th><th>Médico</th><th>Data</th><th>Horário</th><th>Status</th></tr></thead>
      <tbody id="tabelaConsultas">
        <tr><td>Maria Santos</td><td>Dr. João Lima</td><td>2026-06-20</td><td>14:00</td><td>Agendada</td></tr>
      </tbody>
    </table>
  </main>
  <script src="js/script.js"></script>
</body>
</html>
