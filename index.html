<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clínica Plus - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
  <main class="login-container">
    <section class="login-card">
      <h1>Clínica Plus</h1>
      <p>Sistema Web de Gestão Clínica</p>
      <form id="formLogin">
        <label for="identificacao">CPF ou CRM</label>
        <input type="text" id="identificacao" name="identificacao" placeholder="Digite seu CPF ou CRM">

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha">

        <button type="submit">Acessar</button>
        <p id="mensagemLogin" class="mensagem"></p>
      </form>
    </section>
  </main>
  <script src="js/script.js"></script>
</body>
</html>
