<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Médicos</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="topo">
    <h1>Médicos</h1>
    <nav><a href="/dashboard">Voltar</a></nav>
</header>
<main class="container">
    <section class="card">
        <h2>Novo médico</h2>
        <form method="post" action="/medicos" onsubmit="return validarMedico()">
            <input id="cpf" name="cpf" placeholder="CPF" required>
            <input id="crm" name="crm" placeholder="CRM" required>
            <input id="nome" name="nome" placeholder="Nome" required>
            <input id="especialidade" name="especialidade" placeholder="Especialidade" required>
            <input name="telefone" placeholder="Telefone">
            <input name="email" placeholder="E-mail">
            <button class="botao" type="submit">Salvar</button>
        </form>
    </section>

    <section class="card">
        <h2>Médicos cadastrados</h2>
        <table>
            <tr><th>CRM</th><th>Nome</th><th>Especialidade</th></tr>
            <tr th:each="m : ${medicos}">
                <td th:text="${m.crm}"></td>
                <td th:text="${m.nome}"></td>
                <td th:text="${m.especialidade}"></td>
            </tr>
        </table>
    </section>
</main>
<script src="/js/script.js"></script>
</body>
</html>
