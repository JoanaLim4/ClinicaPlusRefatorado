<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clínica Plus - Pacientes</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topo">
    <h1>Clínica Plus</h1>
    <nav>
      <a href="dashboard.html">Início</a>
      <a href="pacientes.html">Pacientes</a>
      <a href="medicos.html">Médicos</a>
      <a href="consultas.html">Consultas</a>
      <a href="index.html">Sair</a>
    </nav>
  </header>

  <main class="container">
    <h2>Cadastro de Pacientes</h2>
    <form id="formPaciente" class="formulario">
      <label>Nome</label>
      <input type="text" id="nomePaciente" placeholder="Nome completo">

      <label>CPF</label>
      <input type="text" id="cpfPaciente" placeholder="Somente números">

      <label>Telefone</label>
      <input type="text" id="telefonePaciente" placeholder="(00) 00000-0000">

      <button type="submit">Salvar Paciente</button>
      <p id="mensagemPaciente" class="mensagem"></p>
    </form>

    <h3>Pacientes cadastrados</h3>
    <table>
      <thead><tr><th>Nome</th><th>CPF</th><th>Telefone</th></tr></thead>
      <tbody id="tabelaPacientes">
        <tr><td>Maria Santos</td><td>12345678900</td><td>(11) 99999-9999</td></tr>
      </tbody>
    </table>
  </main>
  <script src="js/script.js"></script>
</body>
</html>
